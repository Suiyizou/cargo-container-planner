map $uri $tracking_public_limit_key {
  default "";
  /tracking/api/channels/check $binary_remote_addr;
  ~^/tracking/api/track(?:/|$) $binary_remote_addr;
  ~^/api/public/shipments/track(?:;[^/]*)?/?$ $binary_remote_addr;
}

limit_req_zone $tracking_public_limit_key zone=tracking_public_api:10m rate=30r/m;

map $uri $customer_login_limit_key {
  default "";
  ~^/api/(?:public/customers/login|auth/login)(?:;[^/]*)?/?$ $binary_remote_addr;
}

limit_req_zone $customer_login_limit_key zone=customer_login_api:10m rate=10r/m;

map $uri $shipment_upload_limit_key {
  default "";
  ~^/api/(?:customer/shipments/[^/;]+/files|shipments/[^/;]+/files|workspace-files|excel-cleaning/tasks|cargo-imports/preview)(?:;[^/]*)?/?$ $binary_remote_addr;
}

limit_req_zone $shipment_upload_limit_key zone=shipment_upload_api:10m rate=6r/m;
limit_conn_zone $shipment_upload_limit_key zone=shipment_upload_conn:10m;

# The application does not use matrix parameters. Reject semicolons in the
# path (raw or repeatedly percent-encoded) before location/rate-limit matching
# so Spring cannot normalize a bypass such as /public;v=1/customers/login.
map $request_uri $invalid_matrix_path {
  default 0;
  ~*^[^?]*(?:;|%(?:25)*3b) 1;
}

# Compress text assets at the public edge. The stock nginx:alpine image ships
# with gzip support; Brotli is intentionally not enabled because it is not part
# of that image by default.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
  application/javascript
  application/json
  application/manifest+json
  application/xml
  image/svg+xml
  text/css
  text/plain
  text/xml;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # JSON endpoints stay small by default. Known multipart routes override this
  # below so arbitrary API paths cannot be used as anonymous 90 MB body sinks.
  client_max_body_size 2m;
  client_body_timeout 15s;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  if ($invalid_matrix_path) {
    return 400;
  }

  location = /tracking {
    return 301 /tracking/;
  }

  location ^~ /tracking/api/ {
    limit_req zone=tracking_public_api burst=15 nodelay;
    limit_req_status 429;
    proxy_pass http://tracking:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /tracking;
    proxy_read_timeout 120s;
  }

  location ^~ /tracking/ {
    proxy_pass http://tracking:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /tracking;
    proxy_read_timeout 120s;
  }

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location ~ ^/api/(?:customer/shipments/[^/;]+/files|shipments/[^/;]+/files|workspace-files|excel-cleaning/tasks|cargo-imports/preview)(?:;[^/]*)?/?$ {
    client_max_body_size 85m;
    # Keep normal small attachments in memory so a missing or unwritable
    # client-body temp directory cannot turn a 10 KB upload into an nginx 500.
    # Larger bodies are still streamed directly to the backend below.
    client_body_buffer_size 1m;
    client_body_timeout 30s;
    limit_req zone=shipment_upload_api burst=2 nodelay;
    limit_conn shipment_upload_conn 2;
    limit_req_status 429;
    limit_conn_status 429;
    proxy_request_buffering off;
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location ~ ^/api/public/shipments/track(?:;[^/]*)?/?$ {
    limit_req zone=tracking_public_api burst=15 nodelay;
    limit_req_status 429;
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location ~ ^/api/(?:public/customers/login|auth/login)(?:;[^/]*)?/?$ {
    client_max_body_size 32k;
    client_body_timeout 10s;
    limit_req zone=customer_login_api burst=5 nodelay;
    limit_req_status 429;
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /actuator/ {
    proxy_pass http://backend:8080/actuator/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  # Vite fingerprints every production asset under /assets. These URLs are
  # safe to cache indefinitely because a content change produces a new name.
  location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri $uri/ /index.html;
    error_page 404 /index.html;
  }

  # Root-level files such as favicon.svg are not fingerprinted. Revalidate
  # them instead of assigning immutable caching to a stable URL.
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }
}
