map $uri $tracking_public_limit_key {
  default "";
  /tracking/api/channels/check $binary_remote_addr;
  ~^/tracking/api/track(?:/|$) $binary_remote_addr;
}

limit_req_zone $tracking_public_limit_key zone=tracking_public_api:10m rate=30r/m;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;

  location = /tracking {
    return 301 /tracking/;
  }

  location ^~ /tracking/api/ {
    limit_req zone=tracking_public_api burst=15 nodelay;
    limit_req_status 429;
    proxy_pass http://tracking:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /tracking;
    proxy_read_timeout 120s;
  }

  location ^~ /tracking/ {
    proxy_pass http://tracking:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /tracking;
    proxy_read_timeout 120s;
  }

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location /actuator/ {
    proxy_pass http://backend:8080/actuator/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
    error_page 404 /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
