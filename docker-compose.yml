services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    image: cargo-planner-frontend:0.1.0
    container_name: cargo-planner-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cargo-planner-backend:0.1.0
    container_name: cargo-planner-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cargo_planner?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-cargo}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-cargo_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PLANNER_CACHE_TTL_SECONDS: ${PLANNER_CACHE_TTL_SECONDS:-86400}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms256m -Xmx1024m}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: cargo-planner-mysql
    environment:
      MYSQL_DATABASE: cargo_planner
      MYSQL_USER: ${MYSQL_USER:-cargo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cargo_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: cargo-planner-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
