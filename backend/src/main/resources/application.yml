server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cargo-planner-backend
  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL:none}
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.deepseek.com}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_MODEL:deepseek-v4-flash}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/cargo_planner?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:cargo_planner}
    password: ${SPRING_DATASOURCE_PASSWORD:cargo_planner_pwd}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:80MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:85MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  device-limit-per-user: ${APP_DEVICE_LIMIT_PER_USER:5}
  text-recognition:
    # Agent providers commonly rate-limit parallel calls. Keep this bounded to 1-4;
    # use 1 to restore serial execution when a provider has a strict quota.
    excel-agent-concurrency: ${EXCEL_AGENT_BATCH_CONCURRENCY:3}
