server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cargo-planner-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/cargo_planner?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:cargo_planner}
    password: ${SPRING_DATASOURCE_PASSWORD:cargo_planner_pwd}
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  device-limit-per-user: ${APP_DEVICE_LIMIT_PER_USER:5}
